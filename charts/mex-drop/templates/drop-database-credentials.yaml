apiVersion: v1
kind: ServiceAccount
metadata:
  name: mex-vault-secret-reader
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: mex-secret-store
spec:
  provider:
    vault:
      server: 'https://vault.k8s-dev-tools.rki.local'
      path: secrets/mex
      version: v2
      caBundle: 
      auth:
        kubernetes:
          mountPath: kubernetes
          role: mex-secrets-user
          serviceAccountRef:
            name: mex-vault-secret-reader
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mex-credentials
spec:
  refreshInterval: '10s'
  secretStoreRef:
    name: mex-secret-store
    kind: SecretStore
  target:
    name: mex-drop-api-key-database
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: mex-drop-api-key-database
